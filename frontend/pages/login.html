<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Auction System</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <nav class="navbar">
    <h2>🔨 Auction System</h2>
    <div>
      <a href="../index.html">Home</a>
      <a href="register.html">Register</a>
    </div>
  </nav>

  <div class="form-container">
    <h2>🔐 Login</h2>
    <input type="email" id="email" placeholder="Email Address"/>
    <input type="password" id="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
    <p>No account? <a href="register.html">Register here</a></p>
    <p id="msg" class="msg"></p>
  </div>

  <script>
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg      = document.getElementById('msg');

      if (!email || !password) {
        msg.textContent = '❌ Please fill all fields';
        msg.className = 'msg msg-error';
        return;
      }

      try {
        const res = await fetch('http://localhost:5000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          msg.textContent = '✅ Login successful! Redirecting...';
          msg.className = 'msg msg-success';
          setTimeout(() => window.location.href = 'auctions.html', 1000);
        } else {
          msg.textContent = '❌ ' + data.message;
          msg.className = 'msg msg-error';
        }
      } catch (err) {
        msg.textContent = '❌ Server error. Make sure backend is running.';
        msg.className = 'msg msg-error';
      }
    }
  </script>
</body>
</html>
